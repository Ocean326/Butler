<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="100%" height="100%" fill="#F7FAFC"/><text x="800" y="60" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#1A202C" text-anchor="middle">Butler Phase A · Simple Chat</text><text x="800" y="100" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500" fill="#4A5568" text-anchor="middle">A usable entry point, but task meaning is still trapped inside the chat loop</text><rect x="80" y="240" width="220" height="120" rx="18" fill="#FFF5F5" stroke="#E53E3E" stroke-width="2.5"/><text x="190.0" y="310" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1A202C" text-anchor="middle">User</text><rect x="360" y="210" width="300" height="180" rx="18" fill="#FFFFFF" stroke="#3182CE" stroke-width="2.5"/><text x="510.0" y="280" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1A202C" text-anchor="middle">Chat Surface</text><rect x="740" y="210" width="320" height="180" rx="18" fill="#FFFFFF" stroke="#3182CE" stroke-width="2.5"/><text x="900.0" y="280" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1A202C" text-anchor="middle">Prompt / Context Builder</text><rect x="1140" y="210" width="280" height="180" rx="18" fill="#FFFFFF" stroke="#3182CE" stroke-width="2.5"/><text x="1280.0" y="280" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1A202C" text-anchor="middle">LLM Response Loop</text><line x1="300" y1="300" x2="360" y2="300" stroke="#2D3748" stroke-width="4"/><polygon points="360,300 344.0,292.0 344.0,308.0" fill="#2D3748"/><line x1="660" y1="300" x2="740" y2="300" stroke="#2D3748" stroke-width="4"/><polygon points="740,300 724.0,292.0 724.0,308.0" fill="#2D3748"/><line x1="1060" y1="300" x2="1140" y2="300" stroke="#2D3748" stroke-width="4"/><polygon points="1140,300 1124.0,292.0 1124.0,308.0" fill="#2D3748"/><rect x="760" y="500" width="280" height="120" rx="18" fill="#F0FFF4" stroke="#38A169" stroke-width="2"/><text x="900" y="555" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#276749" text-anchor="middle">Recent Context</text><rect x="1100" y="500" width="260" height="120" rx="18" fill="#FAF5FF" stroke="#805AD5" stroke-width="2" stroke-dasharray="10,8"/><text x="1230" y="555" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#553C9A" text-anchor="middle">Early Notes</text><line x1="900" y1="390" x2="900" y2="500" stroke="#38A169" stroke-width="3"/><polygon points="900,500 892.0,484.0 908.0,484.0" fill="#38A169"/><line x1="1230" y1="390" x2="1230" y2="500" stroke="#805AD5" stroke-width="3" stroke-dasharray="10,8"/><polygon points="1230,500 1222.0,484.0 1238.0,484.0" fill="#805AD5"/><rect x="100" y="700" width="1400" height="120" rx="20" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="1.5"/><text x="140" y="748" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#2D3748" text-anchor="start">Developer view: the entry point is right, but chat is carrying too much — dialogue, task state, context and recovery all at once.</text><text x="140" y="782" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500" fill="#2D3748" text-anchor="start">What forces the next layer: once tasks span time, 'can reply' no longer means 'is working'.</text></svg>